<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BankKu Dashboard</title>
    <style>
      :root {
        --bg: #f5f7fa;
        --card: #ffffff;
        --text: #232323;
        --muted: #718096;
        --blue: #1814f3;
        --dark: #343c6a;
        --border: #e6eff5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .app { max-width: 1280px; margin: 0 auto; padding: 24px; }
      .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
      .brand { font-weight:700; font-size:1.1rem; color:var(--dark); }
      .nav { display:flex; gap:16px; color:var(--muted); font-size:0.95rem; }
      .nav .active { color:var(--blue); font-weight:600; }
      .grid { display:grid; gap:20px; }
      .grid-2 { grid-template-columns: 1.3fr 1fr; }
      .card { background:var(--card); border:1px solid var(--border); border-radius:22px; padding:20px; box-shadow:0 8px 30px rgba(15,23,42,0.04); }
      .row { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
      .title { font-size:1rem; font-weight:700; color:var(--dark); }
      .muted { color:var(--muted); font-size:0.9rem; }
      .balance-card { background:linear-gradient(135deg,#1814f3 0%,#343c6a 100%); color:white; border-radius:24px; padding:20px; }
      .balance-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
      .chip { font-size:0.8rem; padding:6px 10px; border-radius:999px; background:rgba(255,255,255,0.16); }
      .amount { font-size:2rem; font-weight:700; margin:6px 0; }
      .mini-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; margin-top:16px; }
      .mini-card { background:#f9fbff; border:1px solid var(--border); border-radius:16px; padding:14px; }
      .list { display:grid; gap:14px; }
      .item { display:flex; justify-content:space-between; align-items:center; padding-bottom:10px; border-bottom:1px solid #f0f4f8; }
      .item:last-child { border-bottom:none; padding-bottom:0; }
      .dot { width:10px; height:10px; border-radius:999px; display:inline-block; margin-right:8px; }
      .chart { height:140px; margin-top:8px; }
      .donut { width:140px; height:140px; border-radius:50%; background:conic-gradient(#1814f3 0 35%, #ff823c 35% 50%, #e735b8 50% 70%, #343c6a 70% 100%); margin:8px auto 0; position:relative; }
      .donut::after { content:"70%"; position:absolute; inset:30px; background:white; border-radius:50%; display:grid; place-items:center; font-weight:700; color:var(--dark); }
      .pill { display:inline-block; padding:6px 10px; border-radius:999px; background:#f5f7fa; color:var(--muted); font-size:0.8rem; }
      @media (max-width:900px) { .grid-2 { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">BankKu Dashboard</div>
        <div class="nav">
          <span class="active">Overview</span>
          <span>Loans</span>
          <span>Settings</span>
        </div>
      </div>

      <div class="grid grid-2">
        <div class="card">
          <div class="balance-card">
            <div class="balance-top">
              <div>
                <div class="chip">My Balance</div>
                <div class="amount">$5,756</div>
              </div>
              <div class="chip">12/22</div>
            </div>
            <div>3778 **** **** 1234</div>
          </div>
          <div class="mini-grid">
            <div class="mini-card">
              <div class="muted">Income</div>
              <div style="font-size:1.1rem;font-weight:700;color:var(--dark)">$2,430</div>
            </div>
            <div class="mini-card">
              <div class="muted">Expenses</div>
              <div style="font-size:1.1rem;font-weight:700;color:var(--dark)">$1,240</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="row">
            <div class="title">Recent Transactions</div>
            <span class="pill">Today</span>
          </div>
          <div class="list">
            <div class="item">
              <div><span class="dot" style="background:#ffbb38"></span>Card Deposit</div>
              <div style="color:#ff4b4a;font-weight:700">-$850</div>
            </div>
            <div class="item">
              <div><span class="dot" style="background:#396aff"></span>PayPal</div>
              <div style="color:#16a34a;font-weight:700">+$2,500</div>
            </div>
            <div class="item">
              <div><span class="dot" style="background:#16a34a"></span>Jemi Wilson</div>
              <div style="color:#16a34a;font-weight:700">+$5,400</div>
            </div>
          </div>
        </div>
      </div>

      <div class="grid grid-2" style="margin-top:20px;">
        <div class="card">
          <div class="row">
            <div class="title">Weekly Activity</div>
            <span class="pill">Sat - Fri</span>
          </div>
          <svg class="chart" viewBox="0 0 320 140" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 110 C40 95, 60 90, 80 85 S120 75, 140 70 S180 55, 200 65 S250 90, 280 55 S300 25, 310 20" stroke="#1814f3" stroke-width="4" fill="none" />
            <path d="M10 120 C40 115, 60 100, 80 95 S120 90, 140 85 S180 75, 200 80 S250 105, 280 85 S300 65, 310 60" stroke="#16c098" stroke-width="4" fill="none" />
          </svg>
        </div>

        <div class="card">
          <div class="row">
            <div class="title">Expense Statistics</div>
            <span class="pill">This month</span>
          </div>
          <div class="donut"></div>
        </div>
      </div>
    </div>
  </body>
</html>
