databases:
  - name: frontend-dashboard-db
    databaseName: frontend_dashboard
    user: frontend_dashboard

services:
  - type: web
    name: frontend-dashboard
    env: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan migrate --force
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php -S 0.0.0.0:$PORT -t public
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://frontend-dashboard.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: frontend-dashboard-db
          property: connectionString
